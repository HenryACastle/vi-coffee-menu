<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{background:var(--wall);color:var(--ink);font-family:var(--sans);overflow-x:hidden;}

  /* ---------------- Hero: full-screen photo + menu over it ---------------- */
  .hero{position:relative;height:220vh;}
  @media (max-width:760px){.hero{height:200vh;}}
  .hero-sticky{position:sticky;top:0;height:100vh;height:100dvh;overflow:hidden;background:var(--wall);}
  .stage{position:absolute;inset:0;}

  /* Full-screen photo (fills the viewport, zooms out on scroll) */
  .photo{position:absolute;inset:0;background-size:cover;background-position:center;
    transform-origin:var(--fx) var(--fy);will-change:transform;}
  .photo.wall{
    background:
      radial-gradient(120% 80% at 50% 6%, rgba(255,255,255,.55), transparent 58%),
      linear-gradient(180deg, #ece2d2 0%, #e2d7c4 70%, #d8ccb6 100%);
  }

  /* Menu overlay — centered card holding all sections */
  .overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    padding:24px;will-change:transform,opacity;transform-origin:center center;}
  .menu-card{
    width:min(1060px,100%);max-height:calc(100vh - 48px);overflow:hidden;
    background:rgba(250,245,238,var(--scrim,.8));
    -webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);
    border:1px solid rgba(111,97,82,.18);border-radius:14px;
    box-shadow:0 18px 50px rgba(40,28,18,.18);
    padding:clamp(20px,3.4vw,40px) clamp(18px,3vw,44px);
  }
  .card-head{text-align:center;margin:0 0 clamp(14px,2.4vw,26px);}
  .card-head h1{font-family:var(--serif);font-weight:400;margin:0;color:var(--ink);
    font-size:clamp(22px,3.6vw,34px);letter-spacing:.01em;}
  .card-head h1 b{font-weight:700;}

  /* All sections visible: 3 across on desktop, stacked on mobile */
  .cols{display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(16px,2.6vw,38px);}
  @media (max-width:760px){.cols{grid-template-columns:1fr;gap:clamp(14px,4vw,22px);}}
  .col h2{
    font-family:var(--serif);font-weight:700;margin:0 0 10px;color:var(--ink);
    font-size:clamp(14px,1.9vw,19px);letter-spacing:.1em;text-transform:uppercase;
    display:flex;align-items:center;gap:10px;
  }
  .col h2::after{content:"";flex:1;height:1px;background:rgba(111,97,82,.3);}
  .col ul{list-style:none;margin:0;padding:0;}
  .col li{display:flex;align-items:baseline;gap:8px;padding:4px 0;
    font-size:clamp(11px,1.35vw,13.5px);letter-spacing:.05em;color:var(--ink);}
  .col li .nm{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .col li .ln{flex:1;border-bottom:1px dotted rgba(111,97,82,.4);transform:translateY(-3px);}
  .col li .pr{color:var(--accent);font-weight:700;font-variant-numeric:tabular-nums;}
  @media (max-width:760px){
    .col{padding-bottom:2px;}
    .col li .nm{white-space:normal;}
  }

  .scroll-cue{
    position:fixed;left:50%;bottom:22px;transform:translateX(-50%);z-index:8;
    color:var(--ink);font-size:11px;letter-spacing:.16em;text-transform:uppercase;
    display:flex;flex-direction:column;align-items:center;gap:6px;
    transition:opacity .4s ease;pointer-events:none;mix-blend-mode:multiply;
  }
  .scroll-cue .chev{animation:bob 1.5s ease-in-out infinite;font-size:14px;}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(5px)}}
  @media (prefers-reduced-motion:reduce){.scroll-cue .chev{animation:none;}}

  /* ---------------- Full typeset menu (with descriptions) ---------------- */
  .menu{background:var(--paper);padding:clamp(40px,7vw,90px) 20px;}
  .menu-inner{max-width:760px;margin:0 auto;}
  .menu-title{
    font-family:var(--serif);text-align:center;font-weight:400;
    font-size:clamp(26px,5vw,42px);letter-spacing:.01em;margin:0 0 6px;text-wrap:balance;
  }
  .menu-title b{font-weight:700;}
  .menu-sub{text-align:center;color:var(--muted);font-size:13px;letter-spacing:.18em;text-transform:uppercase;margin:0 0 46px;}

  .sect{margin:0 0 44px;opacity:0;transform:translateY(26px) scale(.97);transition:opacity .7s ease,transform .7s ease;}
  .sect.in{opacity:1;transform:none;}
  @media (prefers-reduced-motion:reduce){.sect{opacity:1;transform:none;transition:none;}}
  .sect h3{
    font-family:var(--serif);font-weight:700;font-size:clamp(17px,2.6vw,22px);
    letter-spacing:.14em;text-transform:uppercase;margin:0 0 18px;color:var(--ink);
    display:flex;align-items:center;gap:14px;
  }
  .sect h3::after{content:"";flex:1;height:1px;background:rgba(111,97,82,.35);}

  .row{padding:11px 0;border-bottom:1px solid rgba(111,97,82,.2);}
  .row-top{display:flex;align-items:baseline;gap:10px;}
  .row .nm{font-family:var(--sans);font-weight:600;font-size:15px;letter-spacing:.08em;text-transform:uppercase;}
  .row .dots{flex:1;border-bottom:1px dotted rgba(111,97,82,.5);transform:translateY(-4px);}
  .row .pr{font-family:var(--serif);color:var(--accent);font-weight:700;font-size:15px;font-variant-numeric:tabular-nums;}
  .row .desc{margin:5px 0 0;color:var(--muted);font-size:13.5px;line-height:1.5;max-width:60ch;}

  .menu-foot{text-align:center;color:var(--muted);font-size:12px;letter-spacing:.14em;text-transform:uppercase;margin-top:34px;}
</style>
</head>
<body>

  <!-- Hero -->
  <section class="hero">
    <div class="hero-sticky">
      <div class="stage" id="stage">
        <div class="photo" id="photo"></div>
        <div class="overlay" id="overlay"></div>
      </div>
    </div>
  </section>

  <div class="scroll-cue" id="cue"><span>Scroll</span><span class="chev">↓</span></div>

  <!-- Full menu -->
  <section class="menu">
    <div class="menu-inner" id="menuInner"></div>
  </section>

<script>
(function(){
  const S = CONFIG.scene, T = CONFIG.theme, MENU = CONFIG.menu || [];

  // Theme vars
  const rs = document.documentElement.style;
  rs.setProperty('--wall',T.wall); rs.setProperty('--ink',T.ink);
  rs.setProperty('--muted',T.muted); rs.setProperty('--accent',T.accent);
  rs.setProperty('--paper',T.paper); rs.setProperty('--serif',T.serif);
  rs.setProperty('--sans',T.sans);
  rs.setProperty('--fx', S.focusX+'%'); rs.setProperty('--fy', S.focusY+'%');
  rs.setProperty('--scrim', (S.scrim==null?0.8:S.scrim));

  // Full-screen shop photo (fills the viewport, zooms out on scroll)
  const photo = document.getElementById('photo');
  const hasPhoto = S.photo && !/^REPLACE_WITH/.test(S.photo);
  if (hasPhoto){ photo.style.backgroundImage = 'url("'+S.photo+'")'; }
  else { photo.classList.add('wall'); }
  if (S.photoBlend==='multiply') photo.style.mixBlendMode = 'multiply';

  // Emphasize the middle word of a heading, Composition-style
  function emphasize(str){
    const w = str.trim().split(/\s+/);
    if (w.length >= 2){ const m = Math.floor(w.length/2); w[m] = '<b>'+w[m]+'</b>'; }
    return w.join(' ');
  }

  // Overlay = one card with ALL sections shown at once (grid: 3-across / stacked)
  const overlay = document.getElementById('overlay');
  let card = '<div class="menu-card"><div class="card-head"><h1>'+
             emphasize(S.heading||'Our Menu')+'</h1></div><div class="cols">';
  MENU.forEach(sec=>{
    card += '<div class="col"><h2>'+sec.section+'</h2><ul>';
    sec.items.forEach(it=>{
      card += '<li><span class="nm">'+it.name+'</span><span class="ln"></span>'+
              (it.price ? '<span class="pr">'+it.price+'</span>' : '')+'</li>';
    });
    card += '</ul></div>';
  });
  card += '</div></div>';
  overlay.innerHTML = card;

  // Full menu (with descriptions)
  const inner = document.getElementById('menuInner');
  let mh = '<h1 class="menu-title">'+emphasize(S.heading||'Our Menu')+'</h1>'+
           '<p class="menu-sub">VI Coffee Bar</p>';
  MENU.forEach(sec=>{
    mh += '<div class="sect"><h3>'+sec.section+'</h3>';
    sec.items.forEach(it=>{
      mh += '<div class="row"><div class="row-top"><span class="nm">'+it.name+'</span>'+
            '<span class="dots"></span>'+
            (it.price ? '<span class="pr">'+it.price+'</span>' : '')+'</div>'+
            (it.desc ? '<p class="desc">'+it.desc+'</p>' : '')+'</div>';
    });
    mh += '</div>';
  });
  if (CONFIG.footerNote) mh += '<p class="menu-foot">'+CONFIG.footerNote+'</p>';
  inner.innerHTML = mh;

  // Scroll: photo zooms OUT, menu settles IN (scale + fade)
  const hero = document.querySelector('.hero');
  const cue = document.getElementById('cue');
  const photoZoomOut = S.photoZoomOut || 1.35;   // starts big -> 1
  const menuZoomIn   = S.menuZoomIn   || 0.82;   // starts small -> 1
  const INTRO = 0.35;                             // menu settles over the first third

  let ticking = false, cueHidden = false;
  function onScroll(){ if(!ticking){requestAnimationFrame(update);ticking=true;} }
  function update(){
    const r = hero.getBoundingClientRect();
    const total = r.height - window.innerHeight;
    let p = total>0 ? (-r.top)/total : 0;
    p = Math.min(1, Math.max(0, p));

    // Photo zooms OUT across the whole scroll
    const photoScale = photoZoomOut + (1 - photoZoomOut) * p;
    photo.style.transform = 'scale('+photoScale.toFixed(4)+')';

    // Menu grows to full size + fades in over the intro slice, then holds
    const zp = Math.min(1, p / INTRO);
    const menuScale = menuZoomIn + (1 - menuZoomIn) * zp;
    overlay.style.transform = 'scale('+menuScale.toFixed(4)+')';
    overlay.style.opacity = Math.min(1, 0.25 + zp*1.1).toFixed(3);

    if (p>0.02 && !cueHidden){ cueHidden=true; cue.style.opacity='0'; }
    if (p<=0.02 && cueHidden){ cueHidden=false; cue.style.opacity='1'; }
    ticking = false;
  }
  window.addEventListener('scroll', onScroll, {passive:true});
  window.addEventListener('resize', update);
  update();

  // Clean per-section reveal on the full menu
  if ('IntersectionObserver' in window){
    const io = new IntersectionObserver((es)=>{
      es.forEach(e=>{ if(e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target); } });
    }, { threshold:0.18 });
    document.querySelectorAll('.sect').forEach(s=>io.observe(s));
  } else {
    document.querySelectorAll('.sect').forEach(s=>s.classList.add('in'));
  }
})();
</script>
</body>
</html>
